services:
  app:
    build:
      context: .
    container_name: ${APP_CONTAINER_NAME}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # override CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"] in Dockerfile [for dev only]
    volumes:
      - .:/app
    environment:
      APP_NAME: ${APP_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      API_V1_PREFIX: ${API_V1_PREFIX}
      DATABASE_URL: ${DATABASE_URL}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES}
    ports:
      - "${APP_PORT}:8000" # TODO: dont expose database port to the internet [in prod]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: