<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>PrintQ · Get Started</title>

    <style>
        :root {
            --bg-start: #f4f8fc;
            --bg-end: #e6edf5;
            --panel: rgba(255,255,255,0.7);
            --panel-border: rgba(255,255,255,0.7);
            --text: #0b1a2b;
            --text-secondary: #3b4d62;
            --text-muted: #6b8aa3;
            --accent: #0b2b44;
            --accent-hover: #123a5a;
            --accent-light: #d4e0f5;
            --accent-mid: #b8c9e8;
            --success: #1d6f4b;
            --danger: #a52a2a;
            --border: rgba(195, 210, 225, 0.3);
            --shadow: rgba(11, 43, 68, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 36px 32px 32px;
            box-shadow: 0 8px 32px var(--shadow);
        }

        .logo img {
            max-width: 90px;
            margin-bottom: 28px;
            display: block;
        }

        .hero-heading {
            line-height: 1.05;
            letter-spacing: -1.5px;
            margin-bottom: 6px;
        }

        .hero-heading .line-1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
        }

        .hero-heading .word-any {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-weight: 700;
            font-size: 38px;
            background: linear-gradient(145deg, #fce4e0, #f8d0ca);
            color: #a52a2a;
            padding: 1px 14px 4px 12px;
            border-radius: 12px;
            display: inline-block;
        }

        .hero-heading .line-2 {
            display: inline-block;
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
            border-bottom: 2.5px solid var(--text);
            box-shadow: 0 3px 0 var(--accent);
            padding-bottom: 3px;
        }

        .hero-heading .line-3 {
            display: block;
            font-size: 17px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            margin-top: 8px;
        }

        .hero-heading .word-leaving {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-weight: 700;
            color: var(--text);
            background: linear-gradient(145deg, #dde6f5, #c8d5ea);
            padding: 0 12px 2px 12px;
            border-radius: 8px;
            display: inline-block;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input {
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            width: 100%;
            color: var(--text);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid transparent;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            background: rgba(255,255,255,0.8);
        }

        input:disabled {
            background: rgba(255,255,255,0.3);
            color: var(--text-muted);
            cursor: not-allowed;
            border-color: var(--border);
        }

        .btn-wrap {
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: default;
        }

        .primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 20px -8px rgba(11, 43, 68, 0.3);
        }

        .primary:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 12px 28px -8px rgba(11, 43, 68, 0.35);
        }

        .secondary {
            background: var(--success);
            color: white;
            box-shadow: 0 8px 20px -8px rgba(29, 111, 75, 0.3);
        }

        .secondary:hover:not(:disabled) {
            opacity: 0.92;
            box-shadow: 0 12px 28px -8px rgba(29, 111, 75, 0.35);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }

        .hidden { display: none; }

        #otpSection {
            margin-top: 14px;
        }

        .status {
            font-size: 13px;
            margin-top: 12px;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status.error   { color: var(--danger); }
        .status.success { color: var(--success); }

        .status i {
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .card { padding: 28px 22px 24px; border-radius: 20px; }
            .hero-heading .line-1,
            .hero-heading .line-2 { font-size: 34px; }
            .hero-heading .word-any { font-size: 30px; }
        }

        @media (max-width: 600px) {
            body { align-items: flex-start; padding-top: 32px; }
        }
    </style>
</head>

<body>
<div class="card">
    <div class="logo">
        <img src="/static/images/logo.png" alt="PrintQ">
    </div>

    <h1 class="hero-heading">
        <span class="line-1">Print <span class="word-any">Any</span></span>
        <span class="line-2">Document</span>
        <span class="line-3">Without <span class="word-leaving">Leaving</span> Your Room</span>
    </h1>

    <div class="divider"></div>

    <div class="field">
        <label>Phone Number</label>
        <input id="phone" type="tel" placeholder="0712345678">
    </div>

    <div class="btn-wrap">
        <button class="primary" id="sendOtpBtn">Send OTP</button>
    </div>

    <div id="otpSection" class="hidden">
        <div class="field">
            <label>OTP Code</label>
            <input id="otp" type="text" placeholder="Enter OTP">
        </div>
        <button class="secondary" id="verifyBtn">Verify OTP</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script src="/static/javascript/started.js"></script>
</body>
</html>
