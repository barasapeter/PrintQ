<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <title>Get Started</title>

    <style>
        :root{
            --bg:#f7f8fc;
            --panel:#ffffff;
            --text:#0f172a;
            --muted:#475569;
            --border:#e2e8f0;
            --accent:#5b5cff;
            --accent2:#16a34a;
            --danger:#dc2626;
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            font-weight:500;
        }

        .card{
            width:100%;
            max-width:440px;
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
        }

        .logo img{
            max-width:100px;
            margin-bottom:10px;
        }

        h1{
            font-size:22px;
            font-weight:750;
            margin-bottom:6px;
        }

        .service-banner{
            background:#eef2ff;
            border:1px solid #dbeafe;
            padding:12px;
            border-radius:12px;
            font-size:13px;
            font-weight:600;
            margin-bottom:18px;
        }

        .field{
            display:flex;
            flex-direction:column;
            gap:6px;
            margin-bottom:14px;
        }

        label{
            font-size:12px;
            color:var(--muted);
            font-weight:650;
        }

        input{
            padding:12px;
            border:1px solid var(--border);
            border-radius:10px;
            font-size:14px;
            width:100%;
        }

        input:focus{
            border-color:var(--accent);
            box-shadow:0 0 0 3px rgba(91,92,255,0.12);
            outline:none;
        }

        input:disabled{
            background:#f1f5f9;
            color:#94a3b8;
            cursor:not-allowed;
            border-color:#d1d5db;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
        }

        .primary{
            background:var(--accent);
            color:white;
        }

        .secondary{
            background:var(--accent2);
            color:white;
        }

        .primary:hover,
        .secondary:hover{
            opacity:0.92;
        }

        button:disabled{
            opacity:0.5;
            cursor:not-allowed;
            pointer-events:none;
            filter:grayscale(0.2);
        }

        button:disabled:hover{
            opacity:0.5;
            transform:none;
            box-shadow:none;
        }

        .hidden{
            display:none;
        }

        .status{
            font-size:12px;
            margin-top:10px;
            color:var(--muted);
            font-weight:600;
        }

        .error{
            color:var(--danger);
        }

        .success{
            color:var(--accent2);
        }

        @media (max-width:420px){
            .card{
                padding:18px;
            }
        }

        @media (max-width:600px){
            body{
                align-items:flex-start;
                padding-top:32px;
            }
        }
    </style>
</head>

<body>

<div class="card">
    <div class="logo">
        <img src="/static/images/logo.png" alt="">
    </div>

    <div class="service-banner">
        <h1>Get Started</h1>
        Print Any Document Without Leaving Your Room
    </div>

    <div class="field">
        <label>Phone Number</label>
        <input id="phone" type="tel" placeholder="+2547XXXXXXXX">
    </div>

    <button class="primary" id="sendOtpBtn">Send OTP</button>

    <div id="otpSection" class="hidden">
        <div class="field" style="margin-top:16px;">
            <label>OTP Code</label>
            <input id="otp" type="text" placeholder="Enter OTP">
        </div>

        <button class="secondary" id="verifyBtn">Verify OTP</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script src="/static/javascript/started.js"></script>

</body>
</html>
