<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
<title>PrintQ</title>

<style>
:root{
  --bg:#f7f8fc;
  --panel:#ffffff;
  --text:#0f172a;
  --muted:#475569;
  --border:#e2e8f0;
  --accent:#5b5cff;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
}

.container{
  width:min(1100px, 92%);
  margin:0 auto;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 0;
}

.logo img {
  max-width: 100px;
}

.hero{
  padding:34px 0 40px;
}

.hero h1{
  font-size:42px;
  line-height:1.1;
  letter-spacing:-1px;
  max-width:20ch;
}

.cta{
  margin-top:28px;
  display:flex;
  gap:14px;
  text-decoration:none;
}

.button{
  padding:12px 16px;
  border-radius:10px;
  font-weight:600;
  font-size:14px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  text-decoration:none;
}

.button.primary{
  background:var(--accent);
  color:white;
  border:none;
}

.section{
  padding:20px 0;
  border-top:1px solid var(--border);
}

.section h2{
  font-size:22px;
  margin-bottom:14px;
}

.section p{
  color:var(--muted);
  max-width:75ch;
}

.footer{
  padding:40px 0;
  color:var(--muted);
  font-size:13px;
  border-top:1px solid var(--border);
}
</style>

</head>

<body>

<div class="container">

  <nav>
    <div class="logo">
      <img src="/static/images/logo.png" alt="">
    </div>
  </nav>

  <section class="hero">
    <h1>Print Any Document Without Leaving Your Room</h1>

    <div class="cta">
      <a class="button primary" href="/get-started">Print Now</a>
      <a class="button">How it works</a>
    </div>
  </section>

  <section class="section">
    <h2>PrintQ</h2>
    <p style="font-size:18px;color:var(--text)">
      Upload it. Pick it up. Done.
    </p>
  </section>

  <div class="footer">
    © PrintQ. Built for speed, trust, and campus printing.
  </div>

</div>

</body>
</html>
