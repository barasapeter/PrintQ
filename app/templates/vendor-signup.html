<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
<title>Vendor Onboarding</title>

<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success-bg: #ecfdf5;
    --success-text: #047857;
    --error-bg: #fef2f2;
    --error-text: #b91c1c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

    background: var(--bg);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
}

.container {
    width: 100%;
    max-width: 460px;
}

.card {
    background: var(--card);
    border-radius: 24px;
    padding: 40px;
    border: 1px solid var(--border);
    box-shadow:
        0 10px 15px -3px rgba(0, 0, 0, 0.05),
        0 4px 6px -2px rgba(0, 0, 0, 0.03);
}

.logo {
    max-width: 200px;
    display: none;
}

h1 {
    color: var(--text);
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 16px;
}

.field {
    position: relative;
    margin-bottom: 20px;
}

.field input {
    width: 100%;
    height: 60px;
    padding: 24px 16px 8px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: white;
    color: var(--text);
    font-size: 0.95rem;
    transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease;
}

.field input::placeholder {
    color: transparent;
}

.field label {
    position: absolute;
    left: 16px;
    top: 19px;
    color: #94a3b8;
    font-size: 0.95rem;
    pointer-events: none;
    transition: all 0.2s ease;
}

.field input:hover {
    border-color: #cbd5e1;
}

.field input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow:
        0 0 0 4px rgba(37, 99, 235, 0.12);
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: 10px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--primary);
}

button {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 16px;
    background: var(--primary);
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition:
        transform 0.15s ease,
        background 0.15s ease;
}

button:hover {
    background: var(--primary-hover);
}

button:active {
    transform: translateY(1px);
}

button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.alert {
    display: none;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.alert.success {
    display: block;
    background: var(--success-bg);
    color: var(--success-text);
}

.alert.error {
    display: block;
    background: var(--error-bg);
    color: var(--error-text);
}

.footer {
    text-align: center;
    margin-top: 24px;
    color: var(--muted);
    font-size: 0.85rem;
}

@media (max-width: 640px) {
    .card {
        padding: 28px;
        border-radius: 20px;
    }

    h1 {
        font-size: 1.75rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <img src="/static/images/logo.png" alt="Logo" class="logo">

        <h1>Sign Up</h1>

        <div id="alert" class="alert"></div>

        <form id="vendorForm">

            <div class="field">
                <input
                    id="name"
                    type="text"
                    placeholder="Name"
                    required
                >
                <label for="name">Name</label>
            </div>

            <div class="field">
                <input
                    id="username"
                    type="text"
                    placeholder="Username"
                    required
                >
                <label for="username">Username</label>
            </div>

            <div class="field">
                <input
                    id="email"
                    type="email"
                    placeholder="Email Address"
                    required
                >
                <label for="email">Email Address</label>
            </div>

            <div class="field">
                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                    required
                >
                <label for="password">Password</label>
            </div>

            <button id="submitBtn" type="submit">
                Create Account
            </button>

        </form>

        <div class="footer">
            Vendor Registration
        </div>

    </div>
</div>

<script>
const form = document.getElementById("vendorForm");
const submitBtn = document.getElementById("submitBtn");
const alertBox = document.getElementById("alert");

function showAlert(message, type) {
    alertBox.textContent = message;
    alertBox.className = `alert ${type}`;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Creating account...";

    alertBox.className = "alert";

    try {
        const payload = {
            name: document.getElementById("name").value,
            username: document.getElementById("username").value,
            email_address: document.getElementById("email").value,
            password_hash: document.getElementById("password").value
        };

        const response = await fetch("/api/v1/vendor", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(
                data.detail || "Unable to create account."
            );
        }

        showAlert(
            "Vendor account created successfully.",
            "success"
        );
    } catch (error) {
        showAlert(
            error.message || "Something went wrong.",
            "error"
        );
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
    }
});
</script>

</body>
</html>
